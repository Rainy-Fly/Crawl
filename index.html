<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爬虫系统 - 主页面</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="header">
        <h1>爬虫管理系统</h1>
        <div class="user-info">
            <span id="username"></span>
            <button onclick="logout()" class="btn btn-secondary">退出</button>
        </div>
    </div>
    
    <div class="main-container">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="nav-item active" onclick="showSection('upload')">上传配置</div>
            <div class="nav-item" onclick="showSection('configs')">配置文件</div>
            <div class="nav-item" onclick="showSection('tasks')">爬虫任务</div>
            <div class="nav-item" onclick="showSection('results')">爬虫结果</div>
            <div class="nav-item" onclick="location.href='show.html'">可视化展示</div>
        </div>
        
        <!-- 主内容区 -->
        <div class="content">
            <!-- 上传配置区域 -->
            <div id="upload-section" class="section active">
                <h2>上传配置文件</h2>
                
                <div class="upload-tabs">
                    <button class="tab-btn active" onclick="showUploadTab('crawler')">爬虫配置</button>
                    <button class="tab-btn" onclick="showUploadTab('time')">时间配置</button>
                </div>
                
                <div id="crawler-upload" class="upload-content active">
                    <div class="upload-area">
                        <h3>爬虫配置文件</h3>
                        <div class="form-group">
                            <label>配置文件名</label>
                            <input type="text" id="crawler-filename" placeholder="例如: my_crawler_config.json" style="width: 100%; margin-bottom: 10px;">
                        </div>
                        <textarea id="crawler-json" class="large-textarea" placeholder="在此输入爬虫配置JSON..."></textarea>
                        <div class="upload-actions">
                            <input type="file" id="crawler-file" accept=".json" style="display:none">
                            <button onclick="document.getElementById('crawler-file').click()" class="btn btn-secondary">选择文件</button>
                            <button onclick="uploadConfig('crawler')" class="btn btn-primary">上传配置</button>
                        </div>
                    </div>
                </div>
                
                <div id="time-upload" class="upload-content">
                    <div class="upload-area">
                        <h3>时间配置文件</h3>
                        <div class="form-group">
                            <label>配置文件名</label>
                            <input type="text" id="time-filename" placeholder="例如: my_time_config.json" style="width: 100%; margin-bottom: 10px;">
                        </div>
                        <textarea id="time-json" class="large-textarea" placeholder="在此输入时间配置JSON..."></textarea>
                        <div class="upload-actions">
                            <input type="file" id="time-file" accept=".json" style="display:none">
                            <button onclick="document.getElementById('time-file').click()" class="btn btn-secondary">选择文件</button>
                            <button onclick="uploadConfig('time')" class="btn btn-primary">上传配置</button>
                        </div>
                    </div>
                </div>
                
                <div class="demo-section">
                    <h3>示例配置文件</h3>
                    <button onclick="showDemoConfig('crawler')" class="btn btn-info">查看爬虫示例</button>
                    <button onclick="showDemoConfig('time')" class="btn btn-info">查看时间示例</button>
                    <button onclick="downloadDemoConfig('crawler')" class="btn btn-secondary">下载爬虫示例</button>
                    <button onclick="downloadDemoConfig('time')" class="btn btn-secondary">下载时间示例</button>
                </div>
            </div>
            
            <!-- 配置文件列表区域 -->
            <div id="configs-section" class="section">
                <h2>配置文件管理</h2>
                
                <div class="config-tabs">
                    <button class="tab-btn active" onclick="loadConfigList('crawler')">爬虫配置</button>
                    <button class="tab-btn" onclick="loadConfigList('time')">时间配置</button>
                </div>
                
                <div class="config-list" id="config-list">
                    <!-- 配置文件列表将在这里显示 -->
                </div>
            </div>
            
            <!-- 爬虫任务区域 -->
            <div id="tasks-section" class="section">
                <h2>爬虫任务管理</h2>
                
                <div class="task-create">
                    <h3>创建新任务</h3>
                    <div class="form-group">
                        <label>选择爬虫配置</label>
                        <select id="task-crawler-config">
                            <option value="">请选择...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>选择时间配置（可选）</label>
                        <select id="task-time-config">
                            <option value="">立即执行</option>
                        </select>
                    </div>
                    <button onclick="createTask()" class="btn btn-primary">启动爬虫</button>
                </div>
                
                <div class="task-list">
                    <h3>任务列表</h3>
                    <div class="task-filters">
                        <button onclick="loadTaskList()" class="btn btn-small active">全部</button>
                        <button onclick="loadTaskList('未开始')" class="btn btn-small">未开始</button>
                        <button onclick="loadTaskList('进行中')" class="btn btn-small">进行中</button>
                        <button onclick="loadTaskList('已完成')" class="btn btn-small">已完成</button>
                        <button onclick="loadTaskList('已暂停')" class="btn btn-small">已暂停</button>
                    </div>
                    <div id="task-list">
                        <!-- 任务列表将在这里显示 -->
                    </div>
                </div>
            </div>
            
            <!-- 爬虫结果区域 -->
            <div id="results-section" class="section">
                <h2>爬虫结果</h2>
                
                <div class="result-filters">
                    <button onclick="loadResultList()" class="btn btn-small active">全部</button>
                    <button onclick="loadResultList(false)" class="btn btn-small">未保存</button>
                    <button onclick="loadResultList(true)" class="btn btn-small">已保存</button>
                </div>
                
                <div id="result-list" class="result-list">
                    <!-- 结果列表将在这里显示 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 配置文件编辑模态框 -->
    <div id="config-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>编辑配置文件</h3>
                <button onclick="closeModal('config-modal')" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-config-id">
                <div class="form-group">
                    <label>配置文件名</label>
                    <input type="text" id="edit-config-name" style="width: 100%; font-size: 16px; padding: 10px;">
                </div>
                <div class="form-group">
                    <label>配置内容 (JSON)</label>
                    <textarea id="edit-config-content" class="large-editor" placeholder="在此编辑JSON配置..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="saveConfigEdit()" class="btn btn-primary">保存</button>
                <button onclick="closeModal('config-modal')" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 示例配置查看模态框 -->
    <div id="demo-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="demo-modal-title">示例配置</h3>
                <button onclick="closeModal('demo-modal')" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="demo-content"></pre>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('demo-modal')" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>
    
    <!-- 消息提示 -->
    <div id="message" class="message"></div>
    
    <script src="static/js/main.js"></script>
</body>
</html>
